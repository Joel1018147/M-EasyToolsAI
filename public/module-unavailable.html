<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Module Unavailable — M-EasyTools AI+</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#0D1B2A;color:white;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:#1A2D42;border:1px solid #243B55;border-radius:20px;padding:48px 40px;text-align:center;max-width:440px;width:100%}
.icon{font-size:56px;margin-bottom:20px;opacity:.6}
.title{font-family:'Libre Baskerville',serif;font-size:24px;font-weight:700;margin-bottom:10px}
.sub{font-size:14px;color:rgba(255,255,255,0.45);line-height:1.6;margin-bottom:28px}
.badge{display:inline-flex;align-items:center;gap:6px;background:rgba(232,98,42,0.12);border:1px solid rgba(232,98,42,0.25);color:#FF8F66;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:700;margin-bottom:28px}
.btn{display:inline-flex;align-items:center;gap:7px;padding:11px 24px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:none;font-family:'Plus Jakarta Sans',sans-serif;text-decoration:none;background:#E8622A;color:white;transition:all .2s}
.btn:hover{background:#F07340;transform:translateY(-1px)}
</style>
</head>
<body>
<div class="card">
  <div class="icon">🔒</div>
  <div class="badge">⚠️ Module Disabled</div>
  <div class="title">This module is currently unavailable</div>
  <div class="sub">The seller has temporarily disabled this module. Please check back later or contact support.</div>
  <a href="/" class="btn">← Back to Home</a>
</div>
</body>
</html>
